<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
        .logo-text {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            font-size: 80px;
            font-weight: 800;
            letter-spacing: -2px;
        }
    </style>
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="0%" r="100%">
            <stop offset="0%" stop-color="#1f2235" />
            <stop offset="100%" stop-color="#0d0e15" />
        </radialGradient>
    </defs>
    
    <!-- Background matching the portfolio -->
    <rect width="120" height="120" rx="28" fill="url(#bgGrad)" />
    
    <!-- Glassmorphism subtle border -->
    <rect width="118" height="118" x="1" y="1" rx="27" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
    
    <!-- M. Logo -->
    <text x="56" y="88" class="logo-text" fill="#f8fafc" text-anchor="middle">
        M<tspan fill="#6366f1">.</tspan>
    </text>
</svg>
